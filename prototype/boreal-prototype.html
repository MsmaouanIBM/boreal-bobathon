        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body {
            background-color: #F8F6F0;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(15, 61, 46, 0.02) 35px, rgba(15, 61, 46, 0.02) 70px);
        }
        .boreal-logo { font-size: 3rem; font-weight: 700; color: #0F3D2E; letter-spacing: -0.02em; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        .slide-up { animation: slideUp 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .entry-card { border: 2px solid #E5E0D0; transition: all 0.3s ease; cursor: pointer; }
        .entry-card:hover { border-color: #5AB8A8; transform: translateY(-4px); box-shadow: 0 12px 24px rgba(15, 61, 46, 0.12); }
        .upload-zone { border: 3px dashed #5AB8A8; transition: all 0.3s ease; }
        .upload-zone:hover { border-color: #0F3D2E; background-color: rgba(90, 184, 168, 0.05); transform: scale(1.02); }
        .status-line { opacity: 0.3; transition: all 0.5s ease; }
        .status-line.active { opacity: 1; }
        .btn-primary { background-color: #0F3D2E; color: white; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #1A5A45; transform: translateY(-2px); }
        .btn-secondary { background-color: white; color: #0F3D2E; border: 2px solid #0F3D2E; transition: all 0.3s ease; }
        .btn-secondary:hover { background-color: #0F3D2E; color: white; }
        .btn-tertiary { background-color: transparent; color: #555; border: 1px solid #CCC; transition: all 0.2s ease; }
        .btn-tertiary:hover { border-color: #5AB8A8; color: #0F3D2E; }
        .gap-card { transition: all 0.3s ease; }
        .gap-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); }
        .lang-toggle { cursor: pointer; padding: 6px 14px; border-radius: 6px; transition: all 0.2s; }
        .lang-toggle.active { background-color: #0F3D2E; color: white; }
        .loading-dot { animation: pulse 1.5s infinite; color: #5AB8A8; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .scenario-chip { background-color: #F2EEDF; border: 1px solid #D4CFB8; transition: all 0.2s ease; cursor: pointer; }
        .scenario-chip:hover { background-color: #E8E2C8; border-color: #5AB8A8; }
        .claim-section { border-left: 4px solid #5AB8A8; padding-left: 16px; }
        .claim-section.fault { border-left-color: #D97757; }
        .claim-section.next-steps { border-left-color: #0F3D2E; }
        .checklist-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; }
        .checklist-icon { color: #5AB8A8; font-weight: bold; margin-top: 2px; }
        .checklist-icon.warning { color: #D97757; }
        textarea { font-family: 'Inter', sans-serif; resize: none; }
        textarea:focus { outline: none; border-color: #5AB8A8; box-shadow: 0 0 0 3px rgba(90, 184, 168, 0.15); }
    </style>
</head>

        function t(key) { return translations[currentLanguage][key] || key; }

        function updateChrome() {
            document.getElementById('footer-text').textContent = t('footer');
            document.getElementById('footer-text-bottom').textContent = t('footer');
        }

        function switchLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-toggle').forEach(toggle => {
                toggle.classList.toggle('active', toggle.dataset.lang === lang);
            });
            updateChrome();
            renderScreen(currentScreen);
        }

        function selectScenario(scenario) {
            selectedScenario = scenario;
            if (scenario === 'rear-end') claimDescription = t('scenario1');
            else if (scenario === 'hit-run') claimDescription = t('scenario2');
            else if (scenario === 'vandalism') claimDescription = t('scenario3');
            renderScreen(7);
        }

        function startClaimFlow() {
            const textarea = document.getElementById('claim-textarea');
            const text = textarea ? textarea.value.trim() : '';
            claimDescription = text;
            const lower = text.toLowerCase();
            if (lower.includes('rear') || lower.includes('arrière') || lower.includes('feu') || lower.includes('red light')) {
                selectedScenario = 'rear-end';
            } else if ((lower.includes('hit') && (lower.includes('run') || lower.includes('flee') || lower.includes('drove off'))) || lower.includes('fuite') || lower.includes('hit-and-run')) {
                selectedScenario = 'hit-run';
            } else if (lower.includes('vandal') || lower.includes('keyed') || lower.includes('parking')) {
                selectedScenario = 'vandalism';
            } else {
                selectedScenario = 'rear-end';
            }
            renderScreen(7);
        }

        function resetApp() {
            currentScreen = 1;
            currentQuestion = 1;
            answers = { dependents: null, homeowner: null, commute: null };
            claimDescription = '';
            selectedScenario = 'rear-end';
            renderScreen(1);
        }

                                        <div class="text-xs uppercase tracking-wide text-gray-500 mb-1">${t('liability')}</div>
                                        <div class="text-2xl font-bold text-gray-900">$1,000,000</div>
                                    </div>
                                    <div class="pl-0 sm:pl-4">
                                        <div class="text-xs uppercase tracking-wide text-gray-500 mb-1">${t('accidentBenefits')}</div>
                                        <div class="text-2xl font-bold text-gray-900">${t('standard')}</div>
                                    </div>
                                </div>
                                <hr class="my-5 border-gray-100">
                                <div class="space-y-3 text-sm">
                                    <div class="flex justify-between"><span class="text-gray-600">${t('collision')}</span><span class="font-semibold text-gray-900">$500 ${t('deductible')}</span></div>
                                    <div class="flex justify-between"><span class="text-gray-600">${t('comprehensive')}</span><span class="font-semibold text-gray-900">$300 ${t('deductible')}</span></div>
                                    <div class="flex justify-between"><span class="text-gray-600">${t('opcf20')}</span><span class="font-semibold text-green-700">${t('yes')}</span></div>
                                    <div class="flex justify-between"><span class="text-gray-600">${t('opcf39')}</span><span class="font-semibold text-green-700">${t('yes')}</span></div>
                                    <div class="flex justify-between"><span class="text-gray-600">${t('opcf44')}</span><span class="font-semibold text-red-600">${t('no')}</span></div>
                                </div>
                            </div>
                            <div class="text-center">
                                <button onclick="renderScreen(4)" class="btn-primary px-8 py-4 rounded-xl font-semibold text-lg">${t('checkGaps')}</button>
                            </div>
                        </div>
                    `;
                    break;

                case 4:
                    renderQuestion();
                    break;

                case 5:
                    app.innerHTML = `
                        <div class="max-w-6xl w-full slide-up">
                            <h2 class="text-3xl font-bold text-gray-900 mb-8 text-center">${t('gapReport')}</h2>
                            <div class="grid md:grid-cols-3 gap-6 mb-8">
                                <div class="gap-card bg-white rounded-2xl shadow-xl p-6">
                                    <div class="flex items-center gap-2 mb-4"><span class="text-2xl">🟢</span><h3 class="text-xl font-bold text-green-700">${t('covered')}</h3></div>
                                    <div class="space-y-3 text-sm text-gray-700">
                                        <p>• ${t('collisionOk')}</p>
                                        <p>• ${t('comprehensiveOk')}</p>
                                        <p>• ${t('opcf20Ok')}</p>
                                    </div>
                                </div>
                                <div class="gap-card bg-white rounded-2xl shadow-xl p-6">
                                    <div class="flex items-center gap-2 mb-4"><span class="text-2xl">🟡</span><h3 class="text-xl font-bold text-amber-700">${t('underProtected')}</h3></div>
                                    <div class="space-y-4">
                                        <div>
                                            <p class="font-semibold text-gray-900">${t('liabilityTitle')}</p>
                                            <p class="text-xs text-gray-700 mt-1">${t('liabilityConcern')}</p>
                                            <p class="text-xs text-blue-700 italic mt-1">${t('liabilityQuestion')}</p>
                                        </div>
                                        <div class="pt-2 border-t border-gray-100">
                                            <p class="font-semibold text-gray-900">${t('abTitle')}</p>
                                            <p class="text-xs text-gray-700 mt-1">${t('abConcern')}</p>
                                            <p class="text-xs text-blue-700 italic mt-1">${t('abQuestion')}</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="gap-card bg-white rounded-2xl shadow-xl p-6">
                                    <div class="flex items-center gap-2 mb-4"><span class="text-2xl">🔴</span><h3 class="text-xl font-bold text-teal-700">${t('considerAdding')}</h3></div>
                                    <div class="space-y-3">
                                        <p class="font-semibold text-gray-900">${t('opcf44Title')}</p>
                                        <p class="text-sm text-gray-700">${t('opcf44Why')}</p>
                                        <p class="text-sm text-blue-700 italic">${t('opcf44Question')}</p>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-amber-50 border-l-4 border-amber-400 rounded-xl p-6 mb-6">
                                <p class="text-sm text-gray-700">${t('disclaimer')}</p>
                            </div>
                            <div class="text-center">
                                <button onclick="resetApp()" class="btn-tertiary px-6 py-3 rounded-xl font-medium">${t('startOver')}</button>
                            </div>
                        </div>
                    `;
                    break;

                case 6:
                    app.innerHTML = `
                        <div class="max-w-3xl w-full slide-up">
                            <div class="mb-4">
                                <button onclick="renderScreen(1)" class="text-sm text-gray-500 hover:text-gray-900">${t('claimBack')}</button>
                            </div>
                            <h2 class="text-3xl font-bold text-gray-900 mb-3 text-center">${t('claimIntakeTitle')}</h2>
                            <p class="text-center text-gray-600 mb-8">${t('claimIntakeSubtitle')}</p>
                            <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
                                <textarea id="claim-textarea" rows="6" placeholder="${t('claimPlaceholder')}" class="w-full border-2 border-gray-200 rounded-xl p-4 text-base text-gray-900 leading-relaxed"></textarea>
                                <div class="mt-5 text-right">
                                    <button onclick="startClaimFlow()" class="btn-primary px-8 py-3 rounded-xl font-semibold">${t('claimAnalyze')}</button>
                                </div>
                            </div>
                            <div class="text-sm text-gray-500 mb-3">${t('claimScenarioLabel')}</div>
                            <div class="flex flex-wrap gap-3">
                                <span class="scenario-chip px-4 py-2 rounded-full text-sm" onclick="selectScenario('rear-end')">${t('scenario1')}</span>
                                <span class="scenario-chip px-4 py-2 rounded-full text-sm" onclick="selectScenario('hit-run')">${t('scenario2')}</span>
                                <span class="scenario-chip px-4 py-2 rounded-full text-sm" onclick="selectScenario('vandalism')">${t('scenario3')}</span>
                            </div>
                        </div>
                    `;
                    break;

                case 7:
                    renderAgentThinking('claim');
                    break;

                case 8:
                    const lossLabel = selectedScenario === 'rear-end' ? t('lossRearEnd')
                                    : selectedScenario === 'hit-run' ? t('lossHitRun')
                                    : t('lossVandalism');
                    const faultText = selectedScenario === 'rear-end' ? t('faultRearEnd')
                                    : selectedScenario === 'hit-run' ? t('faultHitRun')
                                    : t('faultVandalism');
                    const coverageText = selectedScenario === 'rear-end' ? t('coverageRearEnd')
                                       : selectedScenario === 'hit-run' ? t('coverageHitRun')
                                       : t('coverageVandalism');
                    app.innerHTML = `
                        <div class="max-w-4xl w-full slide-up">
                            <h2 class="text-3xl font-bold text-gray-900 mb-8 text-center">${t('claimRecTitle')}</h2>
                            <div class="bg-white rounded-2xl shadow-xl p-6 mb-5">
                                <h3 class="text-sm uppercase tracking-wide text-gray-500 mb-2">${t('whatHappened')}</h3>
                                <p class="text-gray-900"><span class="font-semibold">${t('lossType')}</span> ${lossLabel}</p>
                            </div>
                            <div class="bg-white rounded-2xl shadow-xl p-6 mb-5 claim-section fault">
                                <h3 class="text-lg font-bold text-gray-900 mb-3">⚖️ ${t('faultAssessment')}</h3>
                                <p class="text-gray-700 leading-relaxed mb-3">${faultText}</p>
                                <div class="bg-amber-50 border-l-4 border-amber-400 rounded-r-lg p-3">
                                    <p class="text-xs text-gray-700"><strong>Important:</strong> ${t('faultDisclaimer')}</p>
                                </div>
                            </div>
                            <div class="bg-white rounded-2xl shadow-xl p-6 mb-5 claim-section">
                                <h3 class="text-lg font-bold text-gray-900 mb-3">🛡️ ${t('coverageApplies')}</h3>
                                <p class="text-gray-700 leading-relaxed">${coverageText}</p>
                            </div>
                            <div class="bg-white rounded-2xl shadow-xl p-6 mb-5 claim-section next-steps">
                                <h3 class="text-lg font-bold text-gray-900 mb-4">⏱️ ${t('nextSteps')}</h3>
                                <div class="mb-5">
                                    <h4 class="font-semibold text-gray-900 mb-2">${t('stepRightNow')}</h4>
                                    <div class="space-y-1">
                                        <div class="checklist-item"><span class="checklist-icon">✓</span><span class="text-sm text-gray-700">${t('stepRightNow1')}</span></div>
                                        <div class="checklist-item"><span class="checklist-icon">✓</span><span class="text-sm text-gray-700">${t('stepRightNow2')}</span></div>
                                        <div class="checklist-item"><span class="checklist-icon">✓</span><span class="text-sm text-gray-700">${t('stepRightNow3')}</span></div>
                                        <div class="checklist-item"><span class="checklist-icon warning">⚠</span><span class="text-sm text-gray-700"><strong>${t('stepRightNowWarn')}</strong></span></div>
                                    </div>
                                </div>
                                <div class="mb-5">
                                    <h4 class="font-semibold text-gray-900 mb-2">${t('stepWithin24h')}</h4>
                                    <div class="space-y-1">
                                        <div class="checklist-item"><span class="checklist-icon">✓</span><span class="text-sm text-gray-700">${t('stepWithin24h1')}</span></div>
                                        <div class="checklist-item"><span class="checklist-icon">✓</span><span class="text-sm text-gray-700">${t('stepWithin24h2')}</span></div>
                                        <div class="checklist-item"><span class="checklist-icon">✓</span><span class="text-sm text-gray-700">${t('stepWithin24h3')}</span></div>
                                    </div>
                                </div>
                                <div>
                                    <h4 class="font-semibold text-gray-900 mb-2">${t('stepThisWeek')}</h4>
                                    <div class="space-y-1">
                                        <div class="checklist-item"><span class="checklist-icon">✓</span><span class="text-sm text-gray-700">${t('stepThisWeek1')}</span></div>
                                        <div class="checklist-item"><span class="checklist-icon">✓</span><span class="text-sm text-gray-700">${t('stepThisWeek2')}</span></div>
                                        <div class="checklist-item"><span class="checklist-icon">✓</span><span class="text-sm text-gray-700">${t('stepThisWeek3')}</span></div>
                                        <div class="checklist-item"><span class="checklist-icon">✓</span><span class="text-sm text-gray-700">${t('stepThisWeek4')}</span></div>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-white rounded-2xl shadow-xl p-6 mb-5">
                                <h3 class="text-lg font-bold text-gray-900 mb-3">❓ ${t('smartQuestions')}</h3>
                                <div class="space-y-2">
                                    <p class="text-sm text-blue-700 italic">${t('question1')}</p>
                                    <p class="text-sm text-blue-700 italic">${t('question2')}</p>
                                    <p class="text-sm text-blue-700 italic">${t('question3')}</p>
                                    <p class="text-sm text-blue-700 italic">${t('question4')}</p>
                                </div>
                            </div>
                            <div class="bg-amber-50 border-l-4 border-amber-400 rounded-xl p-6 mb-6">
                                <p class="text-sm text-gray-700">${t('claimDisclaimer')}</p>
                            </div>
                            <div class="text-center">
                                <button onclick="resetApp()" class="btn-tertiary px-6 py-3 rounded-xl font-medium">${t('startOver')}</button>
                            </div>
                        </div>
                    `;
                    break;
            }
        }

        function renderAgentThinking(flowType) {
            const app = document.getElementById('app');
            const labels = flowType === 'policy' ? {
                a1: t('triageAgent'), a1complete: t('triageComplete'),
                a2: t('policyReader'), a2complete: t('policyComplete'),
                a3: t('readyAnalysis'), nextScreen: 3
            } : {
                a1: t('triageClaim'), a1complete: t('triageClaimComplete'),
                a2: t('claimPrepAgent'), a2complete: t('claimPrepComplete'),
                a3: t('readyClaim'), nextScreen: 8
            };

            app.innerHTML = `
                <div class="max-w-2xl w-full fade-in">
                    <div class="bg-white rounded-2xl shadow-xl p-8">
                        <div class="space-y-6">
                            <div class="status-line" id="s1"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center"><span class="loading-dot">●</span></div><span class="text-gray-600">${labels.a1}</span></div></div>
                            <div class="status-line" id="s2"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center"><span class="loading-dot">●</span></div><span class="text-gray-600">${labels.a2}</span></div></div>
                            <div class="status-line" id="s3"><div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center"><span class="loading-dot">●</span></div><span class="text-gray-600">${labels.a3}</span></div></div>
                        </div>
                    </div>
                </div>
            `;

            setTimeout(() => {
                const s = document.getElementById('s1');
                if (s) { s.classList.add('active'); s.innerHTML = `<div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center"><span class="text-white">✓</span></div><span class="text-gray-900 font-medium">${labels.a1} <span class="text-green-600">✓ ${labels.a1complete}</span></span></div>`; }
            }, 500);
            setTimeout(() => {
                const s = document.getElementById('s2');
                if (s) { s.classList.add('active'); s.innerHTML = `<div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center"><span class="text-white">✓</span></div><span class="text-gray-900 font-medium">${labels.a2} <span class="text-green-600">✓ ${labels.a2complete}</span></span></div>`; }
            }, 1500);
            setTimeout(() => {
                const s = document.getElementById('s3');
                if (s) { s.classList.add('active'); s.innerHTML = `<div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center"><span class="text-white">✓</span></div><span class="text-gray-900 font-medium">${labels.a3}</span></div>`; }
                setTimeout(() => renderScreen(labels.nextScreen), 700);
            }, 2500);
        }

        function renderQuestion() {
            const app = document.getElementById('app');
            let questionText, options;
            switch(currentQuestion) {
                case 1: questionText = t('q1'); options = [{ text: t('yes'), value: true }, { text: t('no'), value: false }]; break;
                case 2: questionText = t('q2'); options = [{ text: t('yes'), value: true }, { text: t('no'), value: false }]; break;
                case 3: questionText = t('q3'); options = [{ text: t('urban'), value: 'urban' }, { text: t('suburban'), value: 'suburban' }, { text: t('highway'), value: 'highway' }]; break;
            }
            app.innerHTML = `
                <div class="max-w-2xl w-full slide-up">
                    <div class="bg-white rounded-2xl shadow-xl p-12 text-center">
                        <div class="mb-8"><span class="text-sm font-medium text-gray-500">${currentLanguage === 'en' ? 'Question' : 'Question'} ${currentQuestion} ${currentLanguage === 'en' ? 'of' : 'de'} 3</span></div>
                        <h2 class="text-2xl font-bold text-gray-900 mb-8">${questionText}</h2>
                        <div class="flex gap-4 justify-center flex-wrap">
                            ${options.map(opt => `<button onclick="answerQuestion('${opt.value}')" class="btn-secondary px-8 py-4 rounded-xl font-semibold text-lg min-w-[140px]">${opt.text}</button>`).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function answerQuestion(value) {
            switch(currentQuestion) {
                case 1: answers.dependents = value === 'true'; break;
                case 2: answers.homeowner = value === 'true'; break;
                case 3: answers.commute = value; break;
            }
            if (currentQuestion < 3) { currentQuestion++; renderQuestion(); }
            else { renderScreen(5); }
        }

        updateChrome();
        renderScreen(1);
    </script>
</body>
</html>
